<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-commerce (Amazon Clone)</title>
  <link rel="stylesheet" href="styles/navbar.css">
  <link rel="stylesheet" href="styles/amazon.css">
</head>
<body>

  <div class="header">
    <div class="header-left">
        <img src="assets/images/amazon-logo-white.png" alt="" class="logo-img">
    </div>

    <div class="header-center">
      <input type="text" placeholder="Search" class="input-bar js-input-bar">
       <div class="autocomplete-suggestions js-autocomplete-suggestions"></div>
      <button class="input-btn js-input-btn"><img src="assets/icons/search-icon.png" alt="" class="search-icon"></button>
    </div>

    <div class="header-right">
      <button class="returns-btn">Returns<br><span style="font-weight: 700;">& Orders</span></button>
      <button class="cart-btn">
        <div class="cart-items js-cart-items"></div>
        
      <a href="cart.html" class="cart-link">
        <div class="cart-icon">
          <img src="assets/icons/cart-icon.png" alt="" class="cart-btn-img">
        </div>
        <div class="cart-text">
          Cart
        </div>
      </a>

      </button>
      
    </div>

  </div>

  <div class="main">
    <div class="products-grid js-products-grid"></div>
  </div>

  <script type="module" src="scripts/amazon.js"></script>
  <script type="module" src="scripts/cart.js"></script>

</body>
</html>
