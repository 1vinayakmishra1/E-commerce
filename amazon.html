<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-commerce</title>
  <link rel="stylesheet" href="amazon.css">
</head>
<body>

  <div class="header">
    <div class="header-left">
        <img src="assets/images/amazon-logo-white.png" alt="" class="logo-img">
    </div>

    <div class="header-center">
      <input type="text" placeholder="Search" class="input-bar">
      <button class="input-btn"><img src="assets/icons/search-icon.png" alt="" class="search-icon"></button>
    </div>

    <div class="header-right">
      <button class="returns-btn">Returns<br><span style="font-weight: 700;">& Orders</span></button>
      <button class="cart-btn"><img src="assets/icons/cart-icon.png" alt="" class="cart-btn-img"></button>
    </div>

  </div>

  <div class="container-all">
    <div class="product-container">
      <div class="product-img-div"><img src="assets/images/appliance-instructions.png" alt="" class="product-img"></div>
      <div class="product-name">instructions of the product thing</div>
      <div class="product-ratings"><img src="assets/ratings/rating-30.png" alt=""></div>
      <div class="price-div">$10</div>
      <div class="dropdown">
        <select name="numbers" id="numbers">
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="4">4</option>
        </select>
      </div>
      <button class="add-to-cart">Add to Cart</button>
    </div>

  </div>

  <script src="amazon.js"></script>

</body>
</html>
