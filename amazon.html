<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-commerce</title>
  <link rel="stylesheet" href="amazon.css">
</head>
<body>

  <div class="header">
    <div class="header-left">
        <img src="images/amazon-logo-white.png" alt="" class="logo-img">
    </div>

    <div class="header-center">
      <input type="text" placeholder="Search" class="input-bar">
      <button class="input-btn"><img src="images/icons/search-icon.png" alt="" class="search-icon"></button>
    </div>

    <div class="header-right">
      <button class="returns-btn">Returns<br><span style="font-weight: 700;">& Orders</span></button>
      <button class="cart-btn"><img src="images/icons/cart-icon.png" alt="" class="cart-btn-img"></button>
    </div>

  </div>
  
</body>
</html>
