<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart</title>
  <link rel="stylesheet" href="styles/cart.css">
</head>
<body>
  <header class="checkout-header">
    <div class="header-content">
      <section class="header-left"><a href="amazon.html"><img src="assets/images/amazon-logo.png" alt=""></a></section>
      <section class="header-center">Checkout(3 items)</section>
      <section class="header-right"><img src="assets/images/checkout-lock-icon.png" alt=""></section>
    </div>
  </header>

    <main>
      <div class="page-title">
        Review your order
      </div>

      <section class="checkout-grid">

        <div class="cart-summary">

          <div class="cart-item-container">

            <div class="delivery-date">Delivery Date: Monday, July 20</div>

            <div class="cart-item-details-grid">

              <img src="assets/images/appliance-instructions.png" alt="">
              <div class="cart-item-details">
                <div class="product-name">Adults Plain Cotton T-Shirt - 2 Pack</div>
                <div class="product-price">$7.99</div>
                <div class="product-quantity">
                  Quantity: 1
                  <button class="update-btn">Update</button>
                  <button class="delete-btn">Delete</button>
                </div>
              </div>

              <div class="delivery-options">
                <div class="delivery-options-title">Choose a delivery option:</div>

                <div class="delivery-option">
                  <input type="radio" name="" id="">
                  <div><div class="delivery-option-date">Monday, July 20</div>
                  <div class="delivery-option-price">FREE Shipping</div></div>
                </div>

                <div class="delivery-option">
                  <input type="radio" name="" id="">
                  <div><div class="delivery-option-date">Tuesday, July 14</div>
                  <div class="delivery-option-price">4.99-Shipping</div></div>
                </div>

                <div class="delivery-option">
                  <input type="radio" name="" id="">
                  <div><div class="delivery-option-date">Friday, July 10</div>
                  <div class="delivery-option-price">9.99-Shipping</div></div>
                </div>

              </div>

            </div>

          </div>

        </div>

        <div class="payment-summary"></div>

      </section>
    </main>
  
      <script type="module" src="scripts/amazon.js"></script>
      <script type="module" src="scripts/cart.js"></script>
      
</body>
</html>
