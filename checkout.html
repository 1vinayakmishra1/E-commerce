<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout</title>
  <link rel="stylesheet" href="styles/checkout.css">
</head>
<body>
  <header class="checkout-header">
    <div class="header-content">
      <section class="header-left"><a href="amazon.html"><img src="assets/images/amazon-logo.png" alt=""></a></section>
      <section class="header-center js-header-center"></section>
      <section class="header-right"><img src="assets/images/checkout-lock-icon.png" alt=""></section>
    </div>
  </header>

    <main>
      <div class="page-title">
        Review your order
      </div>

      <section class="checkout-grid">

        <div class="cart-summary js-cart-summary">
        </div>

        <div class="payment-summary">
          <div class="js-payment-info">

            <div class="payment-summary-title">
              Order Summary
            </div>

            <div class="payment-summary-row">
              <div>items(<span class="js-payment-items-quantity"></span>):</div>
              <div class="payment-summary-money js-items-total">$0.00</div>
            </div>

            <div class="payment-summary-row">
              <div>Shipping & handling:</div>
              <div class="payment-summary-money js-shipping-cost">$0.00</div>
            </div>

            <div class="payment-summary-row subtotal-row">
              <div>Total before tax:</div>
              <div class="payment-summary-money js-total-before-tax">$0.00</div>
            </div>

            <div class="payment-summary-row">
              <div>Estimated tax(10%):</div>
              <div class="payment-summary-money js-estimated-tax">$0.00</div>
            </div>

            <div class="payment-summary-row total-row">
              <div>Order total</div>
              <div class="payment-summary-money js-order-total">$0.00</div>
            </div>

            <button class="place-order-button button-primary">
              Place your order
            </button>

          </div>
        </div>

      </section>
    </main>
  
      <script type="module" src="scripts/cart.js"></script>
      <script type="module" src="scripts/checkout.js"></script>
      
</body>
</html>
